services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: gitvision
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gitvision_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gitvision']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    env_file:
      - ./backend/.env
    build: .
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://gitvision:${DB_PASSWORD}@postgres:5432/gitvision_dev
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  redis_data:
  postgres_data: